<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logs do Sistema — Mensageiros da Paz</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<script src="js/core.js"></script>
<script>THEME.init();</script>
<div id="page-root"></div>
<script>
AUTH.require(); seedIfEmpty();

const ACTION_LABELS = {
  create:'Criação', update:'Atualização', delete:'Exclusão',
  login:'Login', logout:'Logout', view:'Visualização'
};
const ACTION_DOT = {
  create:'create', update:'update', delete:'delete',
  login:'login', logout:'logout', view:'login'
};

function render(){
  const logs=DB.get(KEYS.LOGS);
  const filAction=document.getElementById('fil-action')?.value||'';
  const filModule=document.getElementById('fil-module')?.value||'';
  const filUser=document.getElementById('fil-user')?.value.toLowerCase()||'';
  const filDe=document.getElementById('fil-de')?.value||'';
  const filAte=document.getElementById('fil-ate')?.value||'';

  const filtered=logs.filter(l=>{
    if(filAction && l.action!==filAction)return false;
    if(filModule && l.module!==filModule)return false;
    if(filUser && !l.userName.toLowerCase().includes(filUser) && !l.userLogin.toLowerCase().includes(filUser))return false;
    if(filDe && l.ts.slice(0,10)<filDe)return false;
    if(filAte && l.ts.slice(0,10)>filAte)return false;
    return true;
  });

  document.getElementById('log-count').textContent=filtered.length;

  const modules=[...new Set(logs.map(l=>l.module))].sort();
  const filModEl=document.getElementById('fil-module');
  if(filModEl && filModEl.options.length<=1){
    modules.forEach(m=>{ const o=document.createElement('option'); o.value=m; o.textContent=m; filModEl.appendChild(o); });
  }

  const container=document.getElementById('log-list');
  if(!container)return;
  if(!filtered.length){
    container.innerHTML='<div class="empty-state"><svg class="es-icon" viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg><h3>Nenhum log encontrado</h3><p>As ações realizadas no sistema aparecerão aqui.</p></div>';
    return;
  }

  container.innerHTML=filtered.map(l=>`
    <div class="log-item">
      <div class="log-dot ${ACTION_DOT[l.action]||'login'}"></div>
      <div class="log-info">
        <div class="log-msg">${l.msg}</div>
        <div class="log-meta">
          <span class="log-user">${l.userName}</span>
          <span style="color:var(--text-subtle)">@${l.userLogin}</span>
          <span class="log-module">${l.module}</span>
          <span class="badge badge-gray" style="font-size:10px">${ACTION_LABELS[l.action]||l.action}</span>
          <span class="log-time">${formatDateTime(l.ts)}</span>
        </div>
      </div>
    </div>`).join('');
}

function buildPage(){
  document.getElementById('page-root').innerHTML=`
  <div class="app-layout">
    ${renderSidebar()}
    <main class="main-content">
      <div class="page-header">
        <div class="page-header-left">
          <h1 class="page-title"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg> Logs do Sistema</h1>
          <p class="page-subtitle">Histórico de todas as ações realizadas pelos usuários</p>
        </div>
        <button class="btn btn-danger btn-sm" onclick="clearLogs()"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg> Limpar Logs</button>
      </div>

      <div class="stats-grid" style="grid-template-columns:repeat(auto-fit,minmax(130px,1fr));margin-bottom:20px">
        <div class="stat-card"><div class="stat-icon gray"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div><span class="stat-value" id="log-count">0</span><div class="stat-label">Registros</div></div>
        <div class="stat-card" id="sc-creates"><div class="stat-icon green"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></div><span class="stat-value" id="lc-create">0</span><div class="stat-label">Criações</div></div>
        <div class="stat-card" id="sc-updates"><div class="stat-icon blue"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></div><span class="stat-value" id="lc-update">0</span><div class="stat-label">Edições</div></div>
        <div class="stat-card" id="sc-deletes"><div class="stat-icon red"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg></div><span class="stat-value" id="lc-delete">0</span><div class="stat-label">Exclusões</div></div>
        <div class="stat-card"><div class="stat-icon gray"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg></div><span class="stat-value" id="lc-login">0</span><div class="stat-label">Logins</div></div>
      </div>

      <div class="card">
        <div class="card-header">
          <h2 class="card-title">Histórico de Ações</h2>
          <button class="btn btn-ghost btn-sm" onclick="clearFilters()"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg> Limpar filtros</button>
        </div>
        <div class="filter-bar">
          <div class="form-group"><label>Buscar usuário</label><input type="text" id="fil-user" placeholder="Nome ou @login..." oninput="render()"></div>
          <div class="form-group"><label>Ação</label>
            <select id="fil-action" onchange="render()">
              <option value="">Todas</option>
              <option value="create">Criação</option>
              <option value="update">Atualização</option>
              <option value="delete">Exclusão</option>
              <option value="login">Login</option>
              <option value="logout">Logout</option>
            </select>
          </div>
          <div class="form-group"><label>Módulo</label>
            <select id="fil-module" onchange="render()"><option value="">Todos</option></select>
          </div>
          <div class="form-group"><label>De</label><input type="date" id="fil-de" onchange="render()"></div>
          <div class="form-group"><label>Até</label><input type="date" id="fil-ate" onchange="render()"></div>
        </div>
        <div id="log-list"></div>
      </div>
    </main>
  </div>`;
  setActiveNav();
  updateStats();
  render();
}

function updateStats(){
  const logs=DB.get(KEYS.LOGS);
  ['create','update','delete','login'].forEach(a=>{
    const el=document.getElementById('lc-'+a);
    if(el)el.textContent=logs.filter(l=>l.action===a).length;
  });
}

function clearLogs(){
  if(!AUTH.isSuperAdmin()){toast('Apenas o Super Admin pode limpar logs.','error');return;}
  if(!confirm2('Limpar TODOS os logs? Esta ação não pode ser desfeita.'))return;
  DB.set(KEYS.LOGS,[]);
  LOG.add('delete','Todos os logs foram apagados','Sistema');
  buildPage(); toast('Logs limpos.','warning');
}

function clearFilters(){
  ['fil-user','fil-action','fil-module','fil-de','fil-ate'].forEach(id=>{
    const el=document.getElementById(id); if(el)el.value='';
  });
  render();
}

buildPage();
</script>
</body>
</html>
