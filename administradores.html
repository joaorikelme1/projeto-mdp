<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Administradores — Mensageiros da Paz</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<script src="js/core.js"></script>
<script>THEME.init();</script>
<div id="page-root"></div>

<div class="modal-overlay" id="modal-adm">
  <div class="modal" style="max-width:480px">
    <div class="modal-header">
      <h2 class="modal-title" id="adm-modal-title">Novo Administrador</h2>
      <button class="modal-close" onclick="closeModal('modal-adm')"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
      <div id="adm-error" class="alert alert-danger" style="display:none"></div>
      <input type="hidden" id="adm-id">
      <div class="form-grid">
        <div class="form-group full"><label>Nome Completo *</label><input type="text" id="adm-nome" placeholder="Nome do administrador"></div>
        <div class="form-group"><label>Usuário (login) *</label><input type="text" id="adm-user" placeholder="ex: maria" autocomplete="off"></div>
        <div class="form-group"><label>Senha *</label>
          <div class="input-with-icon">
            <input type="password" id="adm-pass" placeholder="Senha de acesso" autocomplete="new-password">
            <button class="toggle-pass" onclick="toggleAdmPass()"><svg id="adm-eye" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
          </div>
          <small id="adm-pass-hint" style="color:var(--text-muted);font-size:11px;margin-top:4px;display:block">Padrão: acess@123 — usuário deverá trocar no primeiro acesso</small>
        </div>
        <div class="form-group"><label>Perfil</label>
          <select id="adm-role">
            <option value="admin">Administrador</option>
            <option value="superadmin">Super Admin</option>
          </select>
        </div>
        <div class="form-group"><label>Status</label>
          <select id="adm-ativo">
            <option value="1">Ativo</option>
            <option value="0">Inativo</option>
          </select>
        </div>
      </div>
      <div class="alert alert-warning" style="margin-top:4px">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        <span>As senhas são armazenadas localmente. Não utilize senhas sensíveis.</span>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-adm')">Cancelar</button>
      <button class="btn btn-primary" onclick="saveAdm()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg> Salvar</button>
    </div>
  </div>
</div>

<!-- Modal: Trocar senha no primeiro acesso -->
<div class="modal-overlay" id="modal-change-pass" style="z-index:9999">
  <div class="modal" style="max-width:400px">
    <div class="modal-header">
      <h2 class="modal-title">🔐 Troque sua Senha</h2>
    </div>
    <div class="modal-body">
      <p style="margin-bottom:16px;color:var(--text-muted);font-size:14px">Este é seu primeiro acesso. Por segurança, crie uma nova senha para continuar.</p>
      <div id="cp-error" class="alert alert-danger" style="display:none"></div>
      <div class="form-grid">
        <div class="form-group full">
          <label>Nova Senha *</label>
          <input type="password" id="cp-new" placeholder="Digite sua nova senha" autocomplete="new-password">
        </div>
        <div class="form-group full">
          <label>Confirmar Senha *</label>
          <input type="password" id="cp-confirm" placeholder="Confirme a nova senha" autocomplete="new-password">
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-primary" onclick="doChangePass()" style="width:100%">Salvar nova senha</button>
    </div>
  </div>
</div>

<script>
AUTH.require(); seedIfEmpty(); THEME.init();
if(!AUTH.isSuperAdmin()){ window.location.href='dashboard.html'; }

// Verificar primeiro acesso
(function checkFirstLogin(){
  const u = AUTH.getCurrentUser();
  if (!u) return;
  const me = DB.get(KEYS.ADMINS).find(a => a.id === u.id);
  if (me && me.mustChangePass) {
    document.getElementById('modal-change-pass').classList.add('open');
  }
})();

function doChangePass(){
  const nova    = document.getElementById('cp-new').value;
  const confirm = document.getElementById('cp-confirm').value;
  const err     = document.getElementById('cp-error');
  function showErr(m){ err.innerHTML=`<span>${m}</span>`; err.style.display='flex'; }
  if (!nova || nova.length < 4) return showErr('A senha deve ter ao menos 4 caracteres.');
  if (nova === 'acess@123')     return showErr('Escolha uma senha diferente da padrão.');
  if (nova !== confirm)         return showErr('As senhas não conferem.');
  const u = AUTH.getCurrentUser();
  const all = DB.get(KEYS.ADMINS);
  const idx = all.findIndex(a => a.id === u.id);
  if (idx === -1) return;
  all[idx].password = nova;
  all[idx].mustChangePass = false;
  DB.set(KEYS.ADMINS, all);
  LOG.add('update','Senha alterada no primeiro acesso','Administradores');
  document.getElementById('modal-change-pass').classList.remove('open');
  toast('Senha atualizada com sucesso! ✅');
}

let editId=null;

function render(){
  const admins=DB.get(KEYS.ADMINS);
  const el=document.getElementById('adm-list');
  if(!el)return;
  document.getElementById('adm-count').textContent=admins.length;
  if(!admins.length){
    el.innerHTML='<div class="empty-state"><svg class="es-icon" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg><h3>Nenhum administrador</h3></div>';
    return;
  }
  el.innerHTML=admins.map(a=>{
    const initials=a.nome.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
    const isSelf=a.username==='rayssa';
    return `<div class="admin-card">
      <div class="user-avatar" style="width:44px;height:44px;font-size:15px;background:${a.ativo!==false?'var(--primary)':'#888'}">${initials}</div>
      <div class="admin-info">
        <div class="admin-name">${a.nome}</div>
        <div class="admin-user">@${a.username}</div>
        <div class="admin-badge" style="display:flex;gap:6px;margin-top:4px">
          ${a.role==='superadmin'?'<span class="badge badge-dark">Super Admin</span>':'<span class="badge badge-gray">Admin</span>'}
          ${a.ativo!==false?'<span class="badge badge-success">Ativo</span>':'<span class="badge badge-danger">Inativo</span>'}
          ${a.mustChangePass?'<span class="badge badge-warning" title="Aguardando troca de senha no primeiro acesso">🔑 1º acesso</span>':''}
        </div>
      </div>
      <div class="admin-actions">
        <button class="btn btn-ghost btn-sm btn-icon" onclick="editAdm('${a.id}')" title="Editar"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
        ${!isSelf?`<button class="btn btn-danger btn-sm btn-icon" onclick="deleteAdm('${a.id}')" title="Excluir"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg></button>`:''}
      </div>
    </div>`;
  }).join('');
}

function buildPage(){
  document.getElementById('page-root').innerHTML=`
  <div class="app-layout">
    ${renderSidebar()}
    <main class="main-content">
      <div class="page-header">
        <div class="page-header-left">
          <h1 class="page-title"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg> Administradores</h1>
          <p class="page-subtitle">Gerencie os usuários com acesso ao sistema</p>
        </div>
        <button class="btn btn-primary" onclick="newAdm()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg> Novo Admin</button>
      </div>
      <div class="stats-grid" style="grid-template-columns:repeat(1,200px);margin-bottom:20px">
        <div class="stat-card"><div class="stat-icon gray"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div><span class="stat-value" id="adm-count">0</span><div class="stat-label">Administradores</div></div>
      </div>
      <div class="admins-grid" id="adm-list"></div>
    </main>
  </div>`;
  setActiveNav(); render();
}

function newAdm(){
  editId=null;
  document.getElementById('adm-modal-title').textContent='Novo Administrador';
  ['adm-id','adm-nome','adm-user'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('adm-pass').value='acess@123';
  document.getElementById('adm-role').value='admin';
  document.getElementById('adm-ativo').value='1';
  document.getElementById('adm-error').style.display='none';
  openModal('modal-adm');
}
function editAdm(id){
  const a=DB.get(KEYS.ADMINS).find(x=>x.id===id); if(!a)return;
  editId=id;
  document.getElementById('adm-modal-title').textContent='Editar Administrador';
  document.getElementById('adm-id').value=a.id;
  document.getElementById('adm-nome').value=a.nome;
  document.getElementById('adm-user').value=a.username;
  document.getElementById('adm-pass').value=a.password||'';
  document.getElementById('adm-role').value=a.role||'admin';
  document.getElementById('adm-ativo').value=a.ativo!==false?'1':'0';
  document.getElementById('adm-error').style.display='none';
  openModal('modal-adm');
}
function deleteAdm(id){
  const a=DB.get(KEYS.ADMINS).find(x=>x.id===id);
  if(!a||a.username==='rayssa')return;
  if(!confirm2(`Excluir administrador "${a.nome}"?`))return;
  DB.set(KEYS.ADMINS,DB.get(KEYS.ADMINS).filter(x=>x.id!==id));
  LOG.add('delete',`Administrador "${a.nome}" removido`,'Administradores');
  render(); toast('Administrador excluído.','warning');
}
function saveAdm(){
  const nome=document.getElementById('adm-nome').value.trim();
  const user=document.getElementById('adm-user').value.trim().toLowerCase();
  const pass=document.getElementById('adm-pass').value;
  const role=document.getElementById('adm-role').value;
  const ativo=document.getElementById('adm-ativo').value==='1';
  const err=document.getElementById('adm-error');
  function showErr(m){err.innerHTML=`<span>${m}</span>`;err.style.display='flex';}
  if(!nome)return showErr('Informe o nome.');
  if(!user)return showErr('Informe o usuário.');
  if(!pass)return showErr('Informe a senha.');
  if(!/^[a-z0-9_]+$/.test(user))return showErr('Usuário: apenas letras minúsculas, números e _');
  const all=DB.get(KEYS.ADMINS);
  if(!editId && all.some(a=>a.username===user))return showErr('Usuário já existe.');
  const rec={id:editId||DB.genId(),nome,username:user,password:pass,role,ativo,mustChangePass:!editId,criadoEm:editId?all.find(a=>a.id===editId)?.criadoEm:new Date().toISOString()};
  if(editId){const idx=all.findIndex(a=>a.id===editId);all[idx]=rec;}
  else all.push(rec);
  DB.set(KEYS.ADMINS,all);
  LOG.add(editId?'update':'create',`Administrador "${nome}" ${editId?'atualizado':'criado'}`,'Administradores');
  closeModal('modal-adm'); render();
  toast(editId?'Administrador atualizado!':'Administrador criado!');
}
function toggleAdmPass(){
  const inp=document.getElementById('adm-pass');
  inp.type=inp.type==='password'?'text':'password';
}
buildPage();
</script>
</body>
</html>
