<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Mensageiros da Paz</title>
<link rel="stylesheet" href="css/style.css">
<style>
.welcome-bar {
  background: linear-gradient(135deg, var(--bg-card2), rgba(124,61,153,0.15));
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 24px;
  margin-bottom: 28px;
  display: flex; align-items: center; justify-content: space-between;
}
.welcome-text h2 {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  margin-bottom: 4px;
}
.welcome-text p { color: var(--text-muted); font-size: 13px; }
.welcome-icon { font-size: 40px; opacity: 0.8; }

.saldo-destaque {
  background: linear-gradient(135deg, var(--primary-dark), var(--primary));
  border: 1px solid rgba(232,184,109,0.3);
  border-radius: var(--radius-lg);
  padding: 28px;
  margin-bottom: 28px;
  text-align: center;
  position: relative; overflow: hidden;
}
.saldo-destaque::before {
  content: '';
  position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
  font-size: 60px; opacity: 0.12;
}
.saldo-destaque .label { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: rgba(255,255,255,0.6); margin-bottom: 8px; }
.saldo-destaque .valor {
  font-family: 'Playfair Display', serif;
  font-size: 42px; font-weight: 700;
  color: var(--accent);
}
.saldo-destaque .sub { font-size: 13px; color: rgba(255,255,255,0.5); margin-top: 6px; }

.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
.recent-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 0; border-bottom: 1px solid var(--border-light);
}
.recent-item:last-child { border-bottom: none; }
.ri-icon {
  width: 36px; height: 36px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}
.ri-icon.entrada { background: rgba(46,204,113,0.15); }
.ri-icon.saida { background: rgba(231,76,60,0.15); }
.ri-info { flex: 1; }
.ri-desc { font-size: 13px; font-weight: 500; }
.ri-date { font-size: 11px; color: var(--text-muted); }
.ri-val { font-size: 14px; font-weight: 700; }
.ri-val.entrada { color: var(--success); }
.ri-val.saida { color: var(--danger); }

.pendencia-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 9px 0; border-bottom: 1px solid var(--border-light);
  font-size: 13px;
}
.pendencia-item:last-child { border-bottom: none; }
</style>
</head>
<body>
<script src="js/core.js"></script>
<script>THEME.init();</script>

<!-- Modal: Troca de senha no primeiro acesso -->
<div class="modal-overlay" id="modal-change-pass" style="z-index:9999">
  <div class="modal" style="max-width:400px">
    <div class="modal-header">
      <h2 class="modal-title">🔐 Troque sua Senha</h2>
    </div>
    <div class="modal-body">
      <p style="margin-bottom:16px;color:var(--text-muted);font-size:14px">Este é seu primeiro acesso. Por segurança, crie uma nova senha para continuar.</p>
      <div id="cp-error" class="alert alert-danger" style="display:none"></div>
      <div class="form-grid">
        <div class="form-group full">
          <label>Nova Senha *</label>
          <input type="password" id="cp-new" placeholder="Digite sua nova senha" autocomplete="new-password">
        </div>
        <div class="form-group full">
          <label>Confirmar Senha *</label>
          <input type="password" id="cp-confirm" placeholder="Confirme a nova senha" autocomplete="new-password">
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-primary" onclick="doChangePass()" style="width:100%">Salvar nova senha</button>
    </div>
  </div>
</div>

<div id="page-root"></div>
<script>
AUTH.require(); seedIfEmpty();

function doChangePass(){
  const nova    = document.getElementById('cp-new').value;
  const confirm = document.getElementById('cp-confirm').value;
  const err     = document.getElementById('cp-error');
  function showErr(m){ err.innerHTML=`<span>${m}</span>`; err.style.display='flex'; }
  if (!nova || nova.length < 4) return showErr('A senha deve ter ao menos 4 caracteres.');
  if (nova === 'acess@123')     return showErr('Escolha uma senha diferente da padrão.');
  if (nova !== confirm)         return showErr('As senhas não conferem.');
  const u = AUTH.getCurrentUser();
  const all = DB.get(KEYS.ADMINS);
  const idx = all.findIndex(a => a.id === u.id);
  if (idx === -1) return;
  all[idx].password = nova;
  all[idx].mustChangePass = false;
  DB.set(KEYS.ADMINS, all);
  LOG.add('update','Senha alterada no primeiro acesso','Administradores');
  document.getElementById('modal-change-pass').classList.remove('open');
  toast('Senha atualizada com sucesso! ✅');
}

function buildDashboard() {
  const caixa = DB.get(KEYS.CAIXA);
  const ufest = DB.get(KEYS.UNIFORME_FEST);
  const upan  = DB.get(KEYS.UNIFORME_PAN);
  const vendas = DB.get(KEYS.VENDAS);
  const mulheres = DB.get(KEYS.MULHERES);

  // Cálculos
  const entradas = caixa.filter(m=>m.tipo==='entrada').reduce((s,m)=>s+m.valor,0);
  const saidas   = caixa.filter(m=>m.tipo==='saida').reduce((s,m)=>s+m.valor,0);
  const saldo    = entradas - saidas;

  const pixTotal = caixa.filter(m=>m.tipo==='entrada').reduce((s,m)=>s+(m.pix||0),0);
  const dinTotal = caixa.filter(m=>m.tipo==='entrada').reduce((s,m)=>s+(m.dinheiro||0),0);

  const totalVendas = vendas.reduce((s,v)=>s+v.total,0);
  const totalFest   = ufest.reduce((s,u)=>s+(u.pago||0),0);
  const totalPan    = upan.reduce((s,u)=>s+(u.pago||0),0);

  // Pendências
  const pendFest = ufest.filter(u=>u.status!=='pago');
  const pendPan  = upan.filter(u=>u.status!=='pago');
  const totalPend = pendFest.length + pendPan.length;

  // Últimas movimentações
  const recentes = [...caixa].sort((a,b)=>new Date(b.data)-new Date(a.data)).slice(0,5);

  // Pendências recentes
  const pendAll = [...pendFest.map(u=>({...u, modulo:'Festividade'})),
                   ...pendPan.map(u=>({...u, modulo:'Pandeiro'}))]
    .sort((a,b)=>b.saldo-a.saldo).slice(0,5);

  const now = new Date();
  const dateStr = now.toLocaleDateString('pt-BR', {weekday:'long', year:'numeric', month:'long', day:'numeric'});

  document.getElementById('page-root').innerHTML = `
  <div class="app-layout">
    ${renderSidebar()}
    <main class="main-content">
      <div class="welcome-bar">
        <div class="welcome-text">
          <h2>Olá, ${(AUTH.getCurrentUser()||{nome:'Admin'}).nome.split(' ')[0]}!</h2>
          <p>${dateStr.charAt(0).toUpperCase()+dateStr.slice(1)}</p>
        </div>
        <svg class="welcome-icon" viewBox="0 0 24 24"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89L17 22l-5-3-5 3 1.523-9.11"/></svg>
      </div>

      <div class="saldo-destaque" style="display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center">
        <div class="label">Saldo Total do Caixa</div>
        <div class="valor">${formatMoney(saldo)}</div>
        <div class="sub">Entradas: ${formatMoney(entradas)} &nbsp;·&nbsp; Saídas: ${formatMoney(saidas)}</div>
      </div>

      <div class="stats-grid">
        <div class="stat-card green">
          <div class="stat-icon green"><svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg></div>
          <span class="stat-value">${formatMoney(entradas)}</span>
          <div class="stat-label">Total de Entradas</div>
        </div>
        <div class="stat-card red">
          <div class="stat-icon red"><svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 18 13.5 8.5 8.5 13.5 1 6"/><polyline points="17 18 23 18 23 12"/></svg></div>
          <span class="stat-value">${formatMoney(saidas)}</span>
          <div class="stat-label">Total de Saídas</div>
        </div>
        <div class="stat-card blue">
          <div class="stat-icon blue"><svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg></div>
          <span class="stat-value">${formatMoney(pixTotal)}</span>
          <div class="stat-label">Recebido via PIX</div>
        </div>
        <div class="stat-card purple">
          <div class="stat-icon purple"><svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></div>
          <span class="stat-value">${formatMoney(dinTotal)}</span>
          <div class="stat-label">Recebido em Dinheiro</div>
        </div>
        <div class="stat-card gold">
          <div class="stat-icon gold"><svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg></div>
          <span class="stat-value">${formatMoney(totalVendas)}</span>
          <div class="stat-label">Total com Vendas</div>
        </div>
        <div class="stat-card purple">
          <div class="stat-icon purple"><svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.38 3.46 16 2a4 4 0 0 1-8 0L3.62 3.46a2 2 0 0 0-1.34 2.23l.58 3.57a1 1 0 0 0 .99.84H6v10c0 1.1.9 2 2 2h8a2 2 0 0 0 2-2V10h2.15a1 1 0 0 0 .99-.84l.58-3.57a2 2 0 0 0-1.34-2.23z"/></svg></div>
          <span class="stat-value">${formatMoney(totalFest+totalPan)}</span>
          <div class="stat-label">Total com Uniformes</div>
        </div>
        <div class="stat-card blue">
          <div class="stat-icon blue"><svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
          <span class="stat-value">${mulheres.length}</span>
          <div class="stat-label">Mulheres Cadastradas</div>
        </div>
        <div class="stat-card ${totalPend>0?'red':'green'}">
          <div class="stat-icon red"><svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
          <span class="stat-value">${totalPend}</span>
          <div class="stat-label">Pag. Pendentes / Parciais</div>
        </div>
      </div>

      <div class="two-col">
        <div class="card">
          <div class="card-header">
            <h2 class="card-title">Últimas Movimentações</h2>
            <a href="caixa.html" class="btn btn-ghost btn-sm">Ver todas</a>
          </div>
          ${recentes.length === 0
            ? '<div class="empty-state"><div class="es-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg></div><p>Nenhuma movimentação ainda</p></div>'
            : recentes.map(m=>`
            <div class="recent-item">
              <div class="ri-icon ${m.tipo}">${m.tipo==='entrada'?'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>':'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 18 13.5 8.5 8.5 13.5 1 6"/><polyline points="17 18 23 18 23 12"/></svg>'}</div>
              <div class="ri-info">
                <div class="ri-desc">${m.descricao}</div>
                <div class="ri-date">${formatDate(m.data)} · ${m.categoria}</div>
              </div>
              <div class="ri-val ${m.tipo}">${m.tipo==='entrada'?'+':'-'}${formatMoney(m.valor)}</div>
            </div>`).join('')}
        </div>

        <div class="card">
          <div class="card-header">
            <h2 class="card-title">Pendências de Uniforme</h2>
            <span class="badge badge-warning">${totalPend}</span>
          </div>
          ${pendAll.length === 0
            ? '<div class="empty-state"><div class="es-icon"></div><p>Nenhuma pendência!</p></div>'
            : pendAll.map(u=>`
            <div class="pendencia-item">
              <div>
                <div style="font-weight:600">${u.nome}</div>
                <div style="color:var(--text-muted);font-size:11px">${u.congregacao} · ${u.modulo}</div>
              </div>
              <div style="text-align:right">
                ${statusBadge(u.status)}
                <div style="font-size:12px;color:var(--warning);margin-top:3px">Saldo: ${formatMoney(u.saldo)}</div>
              </div>
            </div>`).join('')}
        </div>
      </div>
    </main>
  </div>`;

  setActiveNav();
}

buildDashboard();

// Verificar primeiro acesso — abrir modal de troca de senha
(function(){
  const u = AUTH.getCurrentUser();
  if (!u) return;
  const me = DB.get(KEYS.ADMINS).find(a => a.id === u.id);
  if (me && me.mustChangePass) {
    document.getElementById('modal-change-pass').classList.add('open');
  }
})();
</script>
</body>
</html>
