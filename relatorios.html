<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relatórios — Mensageiros da Paz</title>
<link rel="stylesheet" href="css/style.css">
<style>
.rel-tabs { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:24px; }
.rel-tab {
  padding:8px 16px; border-radius:var(--radius-sm);
  border:1px solid var(--border); background:var(--bg-card2);
  color:var(--text-muted); cursor:pointer; font-size:13px;
  font-family:'DM Sans',sans-serif; font-weight:500;
  transition:var(--transition);
}
.rel-tab.active { background:var(--primary); color:white; border-color:var(--primary); }
.rel-tab:hover:not(.active) { border-color:var(--primary); color:var(--text); }

.rel-section { display:none; }
.rel-section.active { display:block; }

.report-header {
  background:linear-gradient(135deg,var(--bg-card2),rgba(124,61,153,0.1));
  border:1px solid var(--border); border-radius:var(--radius);
  padding:20px 24px; margin-bottom:20px;
  display:flex; align-items:center; justify-content:space-between;
}
.report-title { font-family:'Playfair Display',serif; font-size:18px; }
.report-meta { font-size:12px; color:var(--text-muted); margin-top:4px; }

.summary-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:12px; margin-bottom:20px; }
.sum-card {
  background:var(--bg-card2); border:1px solid var(--border-light);
  border-radius:var(--radius-sm); padding:14px;
  text-align:center;
}
.sum-card .sv { font-family:'Playfair Display',serif; font-size:18px; font-weight:700; margin-bottom:4px; }
.sum-card .sl { font-size:11px; color:var(--text-muted); }

@media print {
  .rel-tabs,.filter-bar,.btn { display:none !important; }
  .rel-section { display:block !important; }
  .report-header { background:none; }
}
</style>
</head>
<body>
<script src="js/core.js"></script>
<script>THEME.init();</script>
<div id="page-root"></div>

<script>
AUTH.require(); seedIfEmpty();
let activeRel = 'geral';

function switchRel(key) {
  activeRel = key;
  document.querySelectorAll('.rel-tab').forEach(t=>t.classList.toggle('active', t.dataset.rel===key));
  document.querySelectorAll('.rel-section').forEach(s=>s.classList.toggle('active', s.id==='rel-'+key));
  renderActive();
}

function renderActive() {
  const fns = { geral:renderGeral, periodo:renderPeriodo, pagamento:renderPagamento, saidas:renderSaidas, uniformes:renderUniformes, vendas:renderVendas, congregacao:renderCongregacao };
  fns[activeRel]?.();
}

function renderGeral() {
  const caixa = DB.get(KEYS.CAIXA);
  const ufest = DB.get(KEYS.UNIFORME_FEST);
  const upan  = DB.get(KEYS.UNIFORME_PAN);
  const vendas= DB.get(KEYS.VENDAS);
  const mulh  = DB.get(KEYS.MULHERES);
  const congs = DB.get(KEYS.CONGREGACOES);

  const entradas = caixa.filter(m=>m.tipo==='entrada').reduce((s,m)=>s+m.valor,0);
  const saidas   = caixa.filter(m=>m.tipo==='saida').reduce((s,m)=>s+m.valor,0);
  const saldo    = entradas - saidas;
  const pix      = caixa.reduce((s,m)=>s+(m.pix||0),0);
  const din      = caixa.reduce((s,m)=>s+(m.dinheiro||0),0);
  const tVend    = vendas.reduce((s,v)=>s+v.total,0);
  const tFest    = ufest.reduce((s,u)=>s+(u.pago||0),0);
  const tPan     = upan.reduce((s,u)=>s+(u.pago||0),0);

  document.getElementById('rel-geral').innerHTML = `
    <div class="report-header">
      <div><div class="report-title">Relatório Geral</div>
        <div class="report-meta">Gerado em ${new Date().toLocaleString('pt-BR')}</div>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="window.print()"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg> Imprimir</button>
    </div>
    <div class="summary-grid">
      <div class="sum-card"><div class="sv" style="color:var(--success)">${formatMoney(entradas)}</div><div class="sl">Total Entradas</div></div>
      <div class="sum-card"><div class="sv" style="color:var(--danger)">${formatMoney(saidas)}</div><div class="sl">Total Saídas</div></div>
      <div class="sum-card"><div class="sv" style="color:var(--accent)">${formatMoney(saldo)}</div><div class="sl">Saldo Atual</div></div>
      <div class="sum-card"><div class="sv" style="color:var(--info)">${formatMoney(pix)}</div><div class="sl">Recebido PIX</div></div>
      <div class="sum-card"><div class="sv" style="color:var(--primary-light)">${formatMoney(din)}</div><div class="sl">Recebido Dinheiro</div></div>
      <div class="sum-card"><div class="sv" style="color:var(--warning)">${formatMoney(tVend)}</div><div class="sl">Total Vendas</div></div>
      <div class="sum-card"><div class="sv">${formatMoney(tFest+tPan)}</div><div class="sl">Total Uniformes</div></div>
      <div class="sum-card"><div class="sv">${mulh.length}</div><div class="sl">Mulheres</div></div>
      <div class="sum-card"><div class="sv">${congs.length}</div><div class="sl">Congregações</div></div>
    </div>
    <div class="card">
      <div class="card-header"><h2 class="card-title">Todas as Movimentações</h2></div>
      <div class="table-wrapper">
        <table>
          <thead><tr><th>Data</th><th>Tipo</th><th>Descrição</th><th>Categoria</th><th>Valor</th><th>Pagamento</th></tr></thead>
          <tbody>
            ${caixa.sort((a,b)=>new Date(b.data)-new Date(a.data)).map(m=>`
            <tr>
              <td>${formatDate(m.data)}</td>
              <td><span class="badge ${m.tipo==='entrada'?'badge-success':'badge-danger'}">${m.tipo==='entrada'?'Entrada':'Saída'}</span></td>
              <td>${m.descricao}</td>
              <td>${m.categoria}</td>
              <td style="font-weight:700;color:${m.tipo==='entrada'?'var(--success)':'var(--danger)'}">
                ${m.tipo==='entrada'?'+':'-'}${formatMoney(m.valor)}
              </td>
              <td>${m.forma==='pix'?'PIX':m.forma==='dinheiro'?'Dinheiro':'Misto'}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>`;
}

function renderPeriodo() {
  const de  = document.getElementById('p-de')?.value||'';
  const ate = document.getElementById('p-ate')?.value||'';
  const caixa = DB.get(KEYS.CAIXA).filter(m=>{
    if (de && m.data<de) return false;
    if (ate && m.data>ate) return false;
    return true;
  }).sort((a,b)=>new Date(b.data)-new Date(a.data));

  const entradas = caixa.filter(m=>m.tipo==='entrada').reduce((s,m)=>s+m.valor,0);
  const saidas   = caixa.filter(m=>m.tipo==='saida').reduce((s,m)=>s+m.valor,0);

  const tb = document.getElementById('tb-periodo');
  if (!tb) return;
  document.getElementById('p-ent').textContent = formatMoney(entradas);
  document.getElementById('p-sai').textContent = formatMoney(saidas);
  document.getElementById('p-sal').textContent = formatMoney(entradas-saidas);

  tb.innerHTML = caixa.map(m=>`
    <tr>
      <td>${formatDate(m.data)}</td>
      <td><span class="badge ${m.tipo==='entrada'?'badge-success':'badge-danger'}">${m.tipo==='entrada'?'Entrada':'Saída'}</span></td>
      <td>${m.descricao}</td>
      <td>${m.categoria}</td>
      <td style="font-weight:700;color:${m.tipo==='entrada'?'var(--success)':'var(--danger)'}">
        ${m.tipo==='entrada'?'+':'-'}${formatMoney(m.valor)}
      </td>
    </tr>`).join('') || `<tr><td colspan="5"><div class="empty-state"><div class="es-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div><p>Nenhuma movimentação no período.</p></div></td></tr>`;
}

function renderPagamento() {
  const caixa = DB.get(KEYS.CAIXA);
  const pix   = caixa.filter(m=>m.pix>0);
  const din   = caixa.filter(m=>m.dinheiro>0);
  const tPix  = pix.reduce((s,m)=>s+(m.pix||0),0);
  const tDin  = din.reduce((s,m)=>s+(m.dinheiro||0),0);

  const el = document.getElementById('rel-pagamento');
  if (!el) return;
  el.innerHTML = `
    <div class="report-header">
      <div><div class="report-title">Relatório por Forma de Pagamento</div></div>
      <button class="btn btn-ghost btn-sm" onclick="window.print()"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg> Imprimir</button>
    </div>
    <div class="summary-grid">
      <div class="sum-card"><div class="sv" style="color:var(--info)">${formatMoney(tPix)}</div><div class="sl"> Total PIX</div></div>
      <div class="sum-card"><div class="sv" style="color:var(--success)">${formatMoney(tDin)}</div><div class="sl"> Total Dinheiro</div></div>
      <div class="sum-card"><div class="sv" style="color:var(--accent)">${formatMoney(tPix+tDin)}</div><div class="sl">Total Geral</div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
      <div class="card">
        <div class="card-header"><h2 class="card-title"> Transações PIX</h2></div>
        <div class="table-wrapper"><table>
          <thead><tr><th>Data</th><th>Descrição</th><th>Valor PIX</th></tr></thead>
          <tbody>${pix.sort((a,b)=>new Date(b.data)-new Date(a.data)).map(m=>`
            <tr><td>${formatDate(m.data)}</td><td>${m.descricao}</td>
            <td style="color:var(--info);font-weight:700">${formatMoney(m.pix)}</td></tr>`).join('')||'<tr><td colspan="3"><div style="text-align:center;padding:20px;color:var(--text-muted)">Sem registros</div></td></tr>'}
          </tbody>
        </table></div>
      </div>
      <div class="card">
        <div class="card-header"><h2 class="card-title"> Transações Dinheiro</h2></div>
        <div class="table-wrapper"><table>
          <thead><tr><th>Data</th><th>Descrição</th><th>Valor</th></tr></thead>
          <tbody>${din.sort((a,b)=>new Date(b.data)-new Date(a.data)).map(m=>`
            <tr><td>${formatDate(m.data)}</td><td>${m.descricao}</td>
            <td style="color:var(--success);font-weight:700">${formatMoney(m.dinheiro)}</td></tr>`).join('')||'<tr><td colspan="3"><div style="text-align:center;padding:20px;color:var(--text-muted)">Sem registros</div></td></tr>'}
          </tbody>
        </table></div>
      </div>
    </div>`;
}

function renderSaidas() {
  const saidas = DB.get(KEYS.CAIXA).filter(m=>m.tipo==='saida').sort((a,b)=>new Date(b.data)-new Date(a.data));
  const total = saidas.reduce((s,m)=>s+m.valor,0);
  const el = document.getElementById('rel-saidas');
  if (!el) return;
  el.innerHTML = `
    <div class="report-header">
      <div><div class="report-title">Relatório de Saídas</div>
        <div class="report-meta">Todas as saídas com justificativa</div>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="window.print()"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg> Imprimir</button>
    </div>
    <div class="summary-grid">
      <div class="sum-card"><div class="sv" style="color:var(--danger)">${formatMoney(total)}</div><div class="sl">Total de Saídas</div></div>
      <div class="sum-card"><div class="sv">${saidas.length}</div><div class="sl">Lançamentos</div></div>
    </div>
    <div class="card">
      <div class="table-wrapper"><table>
        <thead><tr><th>Data</th><th>Descrição</th><th>Categoria</th><th>Valor</th><th>Justificativa</th></tr></thead>
        <tbody>${saidas.map(m=>`
          <tr>
            <td>${formatDate(m.data)}</td>
            <td>${m.descricao}</td>
            <td><span class="badge badge-danger">${m.categoria}</span></td>
            <td style="color:var(--danger);font-weight:700">-${formatMoney(m.valor)}</td>
            <td style="color:var(--text-muted);font-size:12px;max-width:300px">${m.justificativa||'—'}</td>
          </tr>`).join('')||'<tr><td colspan="5"><div style="text-align:center;padding:20px;color:var(--text-muted)">Sem saídas</div></td></tr>'}
        </tbody>
      </table></div>
    </div>`;
}

function renderUniformes() {
  const ufest = DB.get(KEYS.UNIFORME_FEST);
  const upan  = DB.get(KEYS.UNIFORME_PAN);
  const renderTable = (data, titulo) => {
    if (!data.length) return `<p style="color:var(--text-muted);padding:10px">Sem registros.</p>`;
    return `<div class="table-wrapper"><table>
      <thead><tr><th>Congregação</th><th>Nome</th><th>Total</th><th>Pago</th><th>Saldo</th><th>Status</th></tr></thead>
      <tbody>${data.sort((a,b)=>a.nome.localeCompare(b.nome)).map(u=>`
        <tr>
          <td>${u.congregacao}</td><td style="font-weight:600">${u.nome}</td>
          <td>${formatMoney(u.total)}</td>
          <td style="color:var(--success)">${formatMoney(u.pago||0)}</td>
          <td style="color:var(--warning)">${formatMoney(u.saldo||0)}</td>
          <td>${statusBadge(u.status||'nao_pago')}</td>
        </tr>`).join('')}
      </tbody>
    </table></div>`;
  };
  const tFest = ufest.reduce((s,u)=>s+(u.pago||0),0);
  const tPan  = upan.reduce((s,u)=>s+(u.pago||0),0);
  const pFest = ufest.filter(u=>u.status!=='pago').reduce((s,u)=>s+(u.saldo||0),0);
  const pPan  = upan.filter(u=>u.status!=='pago').reduce((s,u)=>s+(u.saldo||0),0);
  const el = document.getElementById('rel-uniformes');
  if (!el) return;
  el.innerHTML = `
    <div class="report-header">
      <div><div class="report-title">Relatório de Uniformes</div></div>
      <button class="btn btn-ghost btn-sm" onclick="window.print()"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg> Imprimir</button>
    </div>
    <div class="summary-grid">
      <div class="sum-card"><div class="sv" style="color:var(--success)">${formatMoney(tFest+tPan)}</div><div class="sl">Total Arrecadado</div></div>
      <div class="sum-card"><div class="sv" style="color:var(--danger)">${formatMoney(pFest+pPan)}</div><div class="sl">Total Pendente</div></div>
      <div class="sum-card"><div class="sv" style="color:var(--info)">${formatMoney(tFest)}</div><div class="sl">Festividade – Pago</div></div>
      <div class="sum-card"><div class="sv" style="color:var(--warning)">${formatMoney(tPan)}</div><div class="sl">Pandeiro – Pago</div></div>
    </div>
    <div class="card" style="margin-bottom:20px">
      <div class="card-header"><h2 class="card-title">Uniforme Festividade</h2></div>
      ${renderTable(ufest,'Festividade')}
    </div>
    <div class="card">
      <div class="card-header"><h2 class="card-title">Uniforme Pandeiro</h2></div>
      ${renderTable(upan,'Pandeiro')}
    </div>`;
}

function renderVendas() {
  const vendas = DB.get(KEYS.VENDAS).sort((a,b)=>new Date(b.data)-new Date(a.data));
  const total = vendas.reduce((s,v)=>s+v.total,0);
  const byProd = {};
  vendas.forEach(v=>{ byProd[v.produto]=(byProd[v.produto]||0)+v.total; });
  const el = document.getElementById('rel-vendas');
  if (!el) return;
  el.innerHTML = `
    <div class="report-header">
      <div><div class="report-title">Relatório de Vendas</div></div>
      <button class="btn btn-ghost btn-sm" onclick="window.print()"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg> Imprimir</button>
    </div>
    <div class="summary-grid">
      <div class="sum-card"><div class="sv" style="color:var(--success)">${formatMoney(total)}</div><div class="sl">Total Arrecadado</div></div>
      <div class="sum-card"><div class="sv">${vendas.length}</div><div class="sl">Transações</div></div>
      ${Object.entries(byProd).map(([k,v])=>`<div class="sum-card"><div class="sv" style="color:var(--accent)">${formatMoney(v)}</div><div class="sl">${k}</div></div>`).join('')}
    </div>
    <div class="card">
      <div class="table-wrapper"><table>
        <thead><tr><th>Data</th><th>Produto</th><th>Qtd</th><th>Unit.</th><th>Total</th><th>Pagamento</th></tr></thead>
        <tbody>${vendas.map(v=>`
          <tr>
            <td>${formatDate(v.data)}</td>
            <td style="font-weight:600">${v.produto}</td>
            <td>${v.qtd}</td>
            <td>${formatMoney(v.unitario)}</td>
            <td style="color:var(--success);font-weight:700">${formatMoney(v.total)}</td>
            <td>${v.forma==='pix'?'PIX':v.forma==='dinheiro'?'Dinheiro':'Misto'}</td>
          </tr>`).join('')||'<tr><td colspan="6" style="text-align:center;padding:20px;color:var(--text-muted)">Sem vendas</td></tr>'}
        </tbody>
      </table></div>
    </div>`;
}

function renderCongregacao() {
  const congs = DB.get(KEYS.CONGREGACOES);
  const ufest = DB.get(KEYS.UNIFORME_FEST);
  const upan  = DB.get(KEYS.UNIFORME_PAN);
  const el = document.getElementById('rel-congregacao');
  if (!el) return;

  const rows = congs.map(c=>{
    const mFest = ufest.filter(u=>u.congregacao===c.nome);
    const mPan  = upan.filter(u=>u.congregacao===c.nome);
    const aFest = mFest.reduce((s,u)=>s+(u.pago||0),0);
    const aPan  = mPan.reduce((s,u)=>s+(u.pago||0),0);
    const pFest = mFest.reduce((s,u)=>s+(u.saldo||0),0);
    const pPan  = mPan.reduce((s,u)=>s+(u.saldo||0),0);
    return { nome:c.nome, cidade:c.cidade, mFest:mFest.length, mPan:mPan.length, aFest, aPan, pFest, pPan };
  });

  el.innerHTML = `
    <div class="report-header">
      <div><div class="report-title">Relatório por Congregação</div></div>
      <button class="btn btn-ghost btn-sm" onclick="window.print()"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg> Imprimir</button>
    </div>
    <div class="card">
      <div class="table-wrapper"><table>
        <thead><tr><th>Congregação</th><th>Cidade</th><th>Qtd Fest.</th><th>Arrecad. Fest.</th><th>Pend. Fest.</th><th>Qtd Pan.</th><th>Arrecad. Pan.</th><th>Pend. Pan.</th><th>Total Arrecad.</th></tr></thead>
        <tbody>${rows.map(r=>`
          <tr>
            <td style="font-weight:700">${r.nome}</td>
            <td>${r.cidade||'—'}</td>
            <td style="text-align:center">${r.mFest}</td>
            <td style="color:var(--success)">${formatMoney(r.aFest)}</td>
            <td style="color:var(--warning)">${formatMoney(r.pFest)}</td>
            <td style="text-align:center">${r.mPan}</td>
            <td style="color:var(--success)">${formatMoney(r.aPan)}</td>
            <td style="color:var(--warning)">${formatMoney(r.pPan)}</td>
            <td style="color:var(--accent);font-weight:700">${formatMoney(r.aFest+r.aPan)}</td>
          </tr>`).join('')||'<tr><td colspan="9" style="text-align:center;padding:20px;color:var(--text-muted)">Sem congregações</td></tr>'}
        </tbody>
      </table></div>
    </div>`;
}

function buildPage() {
  document.getElementById('page-root').innerHTML = `
  <div class="app-layout">
    ${renderSidebar()}
    <main class="main-content">
      <div class="page-header">
        <h1 class="page-title"> Relatórios</h1>
        <p class="page-subtitle">Análises financeiras completas do sistema</p>
      </div>

      <div class="rel-tabs">
        <button class="rel-tab active" data-rel="geral" onclick="switchRel('geral')"> Geral</button>
